version: '3.8'

services:
  nginx-proxy:
    image: nginx-otel:latest
    container_name: nginx-otel
    ports:
      - "443:443"
      - "3000:3000"
      - "80:80"
    volumes:
      - /compartido/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - /compartido/nginx/includes/proxy.conf:/etc/nginx/includes/proxy.conf
      - /compartido/nginx/certificados:/certificados/
      - /compartido/nginx/certificados/zuard/certs:/etc/ssl/certs/
      - /compartido/nginx/certificados/zuard/certs:/etc/ssl/private/
    networks:
      - victoriametrics_vm_net2
      - wordpress_rossy_default
    restart: always

networks:
  victoriametrics_vm_net2:
    external: true
  wordpress_rossy_default:
    external: true


